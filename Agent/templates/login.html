<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | CaloreyI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-white rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-2xl bg-emerald-50 mb-4">
                <span class="text-4xl">🥗</span>
            </div>
            <h1 class="text-3xl font-black text-slate-800">Calorey</h1>
            <p class="text-slate-500 mt-2">Your personalized nutrition journey starts here.</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">User Identifier</label>
                <input type="text" name="user_id" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                       placeholder="Enter your unique ID">
            </div>
            
            <button type="submit" 
                    class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">
                Access Dashboard
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-8 uppercase tracking-widest">
            Secure Agent Portal
        </p>
    </div>
</body>
</html>
